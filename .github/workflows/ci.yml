name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      CI: true
      EXPO_NO_TELEMETRY: 1
      HUSKY: 0
      NODE_OPTIONS: --max_old_space_size=4096

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint and format check
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand --passWithNoTests

      - name: Production export smoke test
        run: npm run export:android

      - name: Upload Expo export artifact
        uses: actions/upload-artifact@v7
        with:
          name: expo-android-export
          path: dist
          if-no-files-found: error
          retention-days: 7
